<script>
   // SCROLL NAVIGATION: hidden at top, visible after 1st section, scrolls to top
   (function() {
      var btnTop = document.getElementById('scrollToTopBtn');
      /* CHANGED: target first section element dynamically so it works on all pages */
      var firstSection = document.querySelector('section');

      function onScroll() {
         if (firstSection) {
            /* CHANGED: show button only when scrolled past the 1st section */
            var sectionBottom = firstSection.offsetTop + firstSection.offsetHeight;
            if (window.pageYOffset > sectionBottom) {
               btnTop.classList.add('scroll-nav-visible');
            } else {
               btnTop.classList.remove('scroll-nav-visible');
            }
         }
      }

      window.addEventListener('scroll', onScroll);

      btnTop.addEventListener('click', function() {
         window.scrollTo({ top: 0, behavior: 'smooth' });
      });
   })();
</script>

  <script>
    const videoLightbox = document.querySelector('.video-lightbox');
    const videoLightboxContent = videoLightbox.querySelector('.video-lightbox-content');
    const closeVideoBtn = videoLightbox.querySelector('.close-video-lightbox');
    
    // remove this part only & use below commented code whenever want dynamic image(jayashree)
    // const allVideoCards = document.querySelectorAll('.video-card');

    // // Open Video Lightbox on Card Click (excluding controls area)
    // allVideoCards.forEach(card => {
    //     card.addEventListener('click', () => {
    //         const video = card.querySelector('video');
    //         const videoSrc = video.querySelector('source').src;
            
    //         videoLightboxContent.querySelector('source').src = videoSrc;
    //         videoLightboxContent.load(); 
    //         videoLightboxContent.play(); 
    //         videoLightbox.classList.add('show');
    //     });
    // });

    //!--use this code instead of above code(jayashree)-->
    document.addEventListener("click", (e) => {

         const card = e.target.closest(".video-card");
         if (!card) return;

         const video = card.querySelector("video source");
         if (!video) return;

         const videoSrc = video.src;

        // IMPORTANT FIX (correct way)
        videoLightboxContent.querySelector("source").src = videoSrc;

        videoLightboxContent.load();
        videoLightboxContent.play();

        videoLightbox.classList.add("show");
     });

    
    
     // Close Video Lightbox on X click
    closeVideoBtn.addEventListener('click', () => {
        videoLightboxContent.pause();
        videoLightboxContent.currentTime = 0; 
        videoLightbox.classList.remove('show');
    });

    // Close Video Lightbox on Background Click
    videoLightbox.addEventListener('click', (e) => {
        if (e.target === videoLightbox) {
            videoLightboxContent.pause();
            videoLightboxContent.currentTime = 0;
            videoLightbox.classList.remove('show');
        }
    });
  </script>

  <script>
    let allGalleryData = [];

const filterButtons = document.querySelectorAll(".filter-btn");

const videoToggleBtn = document.getElementById("video-toggle-btn");

const imageGallery = document.getElementById("imageGallery");

const videoGallery = document.getElementById("videoGallery");

// =========================================
// LOAD API
// =========================================

fetch("http://localhost:8080/api/gallery/all")

  .then(response => response.json())

  .then(data => {

      allGalleryData = data;

      renderGallery(data);

  })

  .catch(error => {

      console.log("Error loading gallery:", error);

  });

// =========================================
// RENDER GALLERY
// =========================================

function renderGallery(data) {

    imageGallery.innerHTML = "";

    videoGallery.innerHTML = "";

    data.forEach(item => {

        // VIDEO
        if(item.category === "CWS_VIDEO") {

            videoGallery.innerHTML += `

                <div class="video-card">

                    <video class="gallery-video" controls>

                        <source
                            src="http://localhost:8080${item.largeImagePath}"
                            type="video/mp4">

                    </video>

                    <div class="video-overlay">

                        <h3>${item.title}</h3>

                    </div>

                </div>

            `;

        }

        // IMAGE
        else {
              // CATEGORY FORMAT
            let displayCategory = item.category;

            if(item.category === "team") {
                displayCategory = "TEAM";
            }

            else if(item.category === "infrastructure") {
                displayCategory = "INFRASTRUCTURE";
            }

            else if(item.category === "events") {
                displayCategory = "EVENTS";
            }

            else if(item.category === "birthday") {
                displayCategory = "BIRTHDAY";
            }

            else if(item.category === "work_anniversary") {
                displayCategory = "WORK ANNIVERSARY";
            }

            imageGallery.innerHTML += `

                <div class="gallery-card ${item.category.toLowerCase()}">

                    <img
                        src="http://localhost:8080${item.smallImagePath}"
   data-small="http://localhost:8080${item.smallImagePath}"
   data-medium="http://localhost:8080${item.mediumImagePath}"
   data-large="http://localhost:8080${item.largeImagePath}"
   alt="${item.title}">

   
                    <div class="gallery-overlay-content">

                        <h3>${item.title}</h3>

                       <p>${displayCategory}</p>

                    </div>

                </div>

            `;

        }

    });

}

// =========================================

filterButtons.forEach(button => {

    button.addEventListener("click", () => {

        const galleryCards =
              document.querySelectorAll(".gallery-card");

        filterButtons.forEach(btn => {

            btn.classList.remove("active");

        });

        videoToggleBtn.classList.remove("active");

        button.classList.add("active");

        const filterValue =
              button.getAttribute("data-filter");

        // SHOW IMAGE SECTION
        imageGallery.style.display = "grid";

        // HIDE VIDEO SECTION
        videoGallery.style.display = "none";

        galleryCards.forEach(card => {

            if(filterValue === "all") {

                card.style.display = "block";

            }

            else {

                if(card.classList.contains(filterValue)) {

                    card.style.display = "block";

                }

                else {

                    card.style.display = "none";

                }

            }

        });

    });

});

// =========================================
// VIDEO BUTTON
// =========================================

videoToggleBtn.addEventListener("click", () => {

    filterButtons.forEach(btn => {

        btn.classList.remove("active");

    });

    videoToggleBtn.classList.add("active");

    imageGallery.style.display = "none";

    videoGallery.style.display = "grid";

});

document.addEventListener("mouseover", (e) => {

    const img = e.target.closest(".gallery-card img");

    if (!img) return;

    img.src = img.dataset.medium;

});

document.addEventListener("mouseout", (e) => {

    const img = e.target.closest(".gallery-card img");

    if (!img) return;

    img.src = img.dataset.small;

});
</script>

</body>
</html>
